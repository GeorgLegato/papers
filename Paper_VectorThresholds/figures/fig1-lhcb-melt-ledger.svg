<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="420" viewBox="0 0 1180 420" role="img" aria-labelledby="title desc">
  <title id="title">LHCb result mapped to a MELT threshold ledger</title>
  <desc id="desc">A compact diagram linking LHCb observables to MELT Born readout, CP3 hadron bus, CP4 domain wall, and CP5 lepton vector readout.</desc>
  <style>
    text{font-family:Arial,Helvetica,sans-serif}
    .title{font-size:24px;font-weight:700;fill:#172033}
    .sub{font-size:14px;fill:#4a5568}
    .box{fill:#f8fafc;stroke:#94a3b8;stroke-width:1.4;rx:10}
    .box2{fill:#fff7ed;stroke:#c2410c;stroke-width:1.4;rx:10}
    .box3{fill:#f0fdf4;stroke:#15803d;stroke-width:1.4;rx:10}
    .head{font-size:16px;font-weight:700;fill:#172033}
    .body{font-size:13px;fill:#334155}
    .num{font-size:14px;font-weight:700;fill:#991b1b}
    .arrow{stroke:#64748b;stroke-width:1.8;marker-end:url(#arrow)}
    .dash{stroke:#64748b;stroke-width:1.4;stroke-dasharray:5 5}
  </style>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1180" height="420" fill="#ffffff"/>
  <text x="40" y="42" class="title">LHCb arXiv:2603.12477 as a MELT threshold ledger</text>
  <text x="40" y="66" class="sub">The public mass-spectrum fit is read as an operator ledger, not as a raw resonance-peak claim.</text>

  <rect x="40" y="105" width="205" height="118" class="box"/>
  <text x="60" y="135" class="head">LHCb fit</text>
  <text x="60" y="162" class="body">unbinned mμμ spectrum</text>
  <text x="60" y="184" class="body">local + nonlocal amplitudes</text>
  <text x="60" y="206" class="num">CV, CA, DD* step</text>

  <line x1="252" y1="164" x2="313" y2="164" class="arrow"/>

  <rect x="320" y="105" width="205" height="118" class="box2"/>
  <text x="340" y="135" class="head">Born annulus</text>
  <text x="340" y="162" class="body">rate fixes radius</text>
  <text x="340" y="184" class="num">CV² + CA²</text>
  <text x="340" y="206" class="body">phase via interference</text>

  <line x1="532" y1="164" x2="593" y2="164" class="arrow"/>

  <rect x="600" y="105" width="205" height="118" class="box3"/>
  <text x="620" y="135" class="head">CP³ hadron bus</text>
  <text x="620" y="162" class="body">open charm enters</text>
  <text x="620" y="184" class="num">DD* = 3871.70</text>
  <text x="620" y="206" class="body">threshold gate</text>

  <line x1="812" y1="164" x2="873" y2="164" class="arrow"/>

  <rect x="880" y="105" width="240" height="118" class="box"/>
  <text x="900" y="135" class="head">CP⁴ domain wall</text>
  <text x="900" y="162" class="body">0-bit transient crossing</text>
  <text x="900" y="184" class="num">ΔDD* = −1.37 ± 0.53</text>
  <text x="900" y="206" class="body">vector coefficient shifts</text>

  <rect x="180" y="278" width="235" height="92" class="box"/>
  <text x="200" y="308" class="head">Vector deficit</text>
  <text x="200" y="334" class="num">ΔCV = 0.873</text>
  <text x="200" y="356" class="body">0.981 × 0.8901-bit anchor</text>

  <rect x="475" y="278" width="235" height="92" class="box"/>
  <text x="495" y="308" class="head">Mode lock</text>
  <text x="495" y="334" class="num">DD* − J/ψ = 775.05 MeV</text>
  <text x="495" y="356" class="body">ρ(770) = 775.26 MeV</text>

  <rect x="770" y="278" width="235" height="92" class="box"/>
  <text x="790" y="308" class="head">Axial drift</text>
  <text x="790" y="334" class="num">b = −0.090 ± 0.045</text>
  <text x="790" y="356" class="body">slow q² coarse-graining</text>

  <line x1="422" y1="223" x2="297" y2="278" class="dash"/>
  <line x1="702" y1="223" x2="592" y2="278" class="dash"/>
  <line x1="1000" y1="223" x2="887" y2="278" class="dash"/>
</svg>
